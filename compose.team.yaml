services:
  drone-dev:
    image: signliast/narae-drone-gazebo:v1
    container_name: drone_dev

    network_mode: host
    ipc: host
    privileged: true

    environment:
      - ROS_DOMAIN_ID=10
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3

    volumes:
      - ./:/ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    stdin_open: true
    tty: true
